<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>To-Do List</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f0ebe3;
    --card:     #faf7f2;
    --border:   #d9d0c3;
    --text:     #3a3530;
    --muted:    #8a7f74;
    --accent:   #7d8c6e;
    --accent2:  #b07d5a;
    --danger:   #a05c5c;
    --done-bg:  #edeae4;
    --shadow:   rgba(60,50,40,.10);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Lora', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown .6s ease both;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--text);
    letter-spacing: .02em;
  }
  .header p {
    color: var(--muted);
    font-style: italic;
    margin-top: 6px;
    font-size: .95rem;
  }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 28px 24px;
    box-shadow: 0 8px 32px var(--shadow);
    animation: fadeUp .6s .1s ease both;
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    transition: transform .25s ease;
  }
  .stat-num.bump {
    animation: bump .3s ease;
  }
  .stat-label {
    font-size: .7rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .stat:nth-child(2) .stat-num { color: var(--accent); }
  .stat:nth-child(3) .stat-num { color: var(--accent2); }

  /* ── PROGRESS ── */
  .progress-wrap {
    height: 7px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── INPUT ── */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'Lora', serif;
    font-size: .95rem;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(125,140,110,.15);
  }
  .input-row input::placeholder { color: var(--muted); font-style: italic; }
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 20px;
    font-family: 'Playfair Display', serif;
    font-size: .95rem;
    cursor: pointer;
    transition: background .2s, transform .15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: #6a7860; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 16px;
  }

  /* ── TASK LIST ── */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 13px 14px;
    animation: slideIn .35s cubic-bezier(.34,1.56,.64,1) both;
    transition: opacity .3s, transform .3s, background .3s;
  }
  .task-item.removing {
    animation: slideOut .35s ease forwards;
  }
  .task-item.done {
    background: var(--done-bg);
    opacity: .72;
  }

  /* custom checkbox */
  .check-wrap {
    position: relative;
    flex-shrink: 0;
    width: 22px;
    height: 22px;
  }
  .check-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    z-index: 2;
  }
  .check-box {
    position: absolute;
    inset: 0;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    transition: background .2s, border-color .2s;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .check-wrap input:checked ~ .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-box svg { opacity: 0; transform: scale(.5); transition: opacity .2s, transform .25s cubic-bezier(.34,1.56,.64,1); }
  .check-wrap input:checked ~ .check-box svg { opacity: 1; transform: scale(1); }

  .task-text {
    flex: 1;
    font-size: .97rem;
    color: var(--text);
    transition: color .3s, text-decoration .3s;
    word-break: break-word;
  }
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 2px 5px;
    border-radius: 6px;
    transition: color .2s, background .2s;
    font-size: 1.1rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .btn-del:hover { color: var(--danger); background: rgba(160,92,92,.1); }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    padding: 24px 0;
    font-size: .95rem;
  }

  /* ── TOAST ── */
  .toast-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 999;
  }
  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 40px;
    text-align: center;
    box-shadow: 0 16px 48px rgba(60,50,40,.18);
    opacity: 0;
    transform: scale(.7);
    transition: opacity .3s cubic-bezier(.34,1.56,.64,1), transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: all;
  }
  .toast-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    font-weight: 700;
  }
  .toast-sub {
    color: var(--muted);
    font-style: italic;
    font-size: .9rem;
    margin-top: 4px;
  }

  /* ── CANVAS ── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 998;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:none; } }
  @keyframes slideIn  { from { opacity:0; transform:translateX(-18px) scale(.97); } to { opacity:1; transform:none; } }
  @keyframes slideOut { to   { opacity:0; transform:translateX(18px) scale(.95) ; height:0; padding:0; margin:0; border:none; } }
  @keyframes bump     { 0%,100%{transform:scale(1);} 40%{transform:scale(1.28);} }
</style>
</head>
<body>

<div class="header">
  <h1>My To-Do List</h1>
  <p>A quiet place to get things done.</p>
</div>

<div class="card">

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-left">0</div>
      <div class="stat-label">Left</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <!-- INPUT -->
  <div class="input-row">
    <input type="text" id="task-input" placeholder="Add a new task..." maxlength="120"/>
    <button class="btn-add" id="btn-add">Add</button>
  </div>

  <div class="divider"></div>

  <!-- LIST -->
  <ul class="task-list" id="task-list"></ul>
  <div class="empty-msg" id="empty-msg" style="display:none;">All clear! Add something above.</div>

</div>

<!-- TOAST -->
<div class="toast-overlay">
  <div class="toast" id="toast">
    <div class="toast-title">Good Job!</div>
    <div class="toast-sub">One step closer to done.</div>
  </div>
</div>

<!-- CONFETTI CANVAS -->
<canvas id="confetti-canvas"></canvas>

<script>
(function () {
  // ── STATE ──────────────────────────────────────────────
  let tasks = [
    { id: uid(), text: "Buy groceries", done: false },
    { id: uid(), text: "Read for 20 minutes", done: false },
    { id: uid(), text: "Reply to emails", done: false },
  ];

  function uid() {
    return Math.random().toString(36).slice(2, 10);
  }

  // ── DOM REFS ───────────────────────────────────────────
  const listEl      = document.getElementById("task-list");
  const inputEl     = document.getElementById("task-input");
  const btnAdd      = document.getElementById("btn-add");
  const emptyMsg    = document.getElementById("empty-msg");
  const progressBar = document.getElementById("progress-bar");
  const statTotal   = document.getElementById("stat-total");
  const statDone    = document.getElementById("stat-done");
  const statLeft    = document.getElementById("stat-left");
  const toast       = document.getElementById("toast");
  const canvas      = document.getElementById("confetti-canvas");
  const ctx         = canvas.getContext("2d");

  // ── RENDER ─────────────────────────────────────────────
  function render() {
    // --- counts (single source of truth) ---
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const left  = total - done;

    // --- update stat numbers with bump animation ---
    updateStat(statTotal, total);
    updateStat(statDone,  done);
    updateStat(statLeft,  left);

    // --- progress bar ---
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressBar.style.width = pct + "%";

    // --- empty message ---
    emptyMsg.style.display = total === 0 ? "block" : "none";

    // --- build list DOM ---
    // Remove items that no longer exist in state
    const existingIds = new Set(
      Array.from(listEl.querySelectorAll(".task-item")).map(el => el.dataset.id)
    );
    const stateIds = new Set(tasks.map(t => t.id));

    // Delete removed items
    listEl.querySelectorAll(".task-item").forEach(el => {
      if (!stateIds.has(el.dataset.id)) {
        el.classList.add("removing");
        setTimeout(() => el.remove(), 350);
      }
    });

    // Add new items / update existing
    tasks.forEach((task, index) => {
      let el = listEl.querySelector(`.task-item[data-id="${task.id}"]`);
      if (!el) {
        el = createTaskEl(task);
        // insert in correct order
        const allItems = listEl.querySelectorAll(".task-item");
        if (allItems.length === 0 || index >= allItems.length) {
          listEl.appendChild(el);
        } else {
          listEl.insertBefore(el, allItems[index]);
        }
      }
      // Sync done state
      const cb   = el.querySelector("input[type=checkbox]");
      const text = el.querySelector(".task-text");
      cb.checked = task.done;
      el.classList.toggle("done", task.done);
      text.textContent = task.text;
    });
  }

  function updateStat(el, newVal) {
    const old = parseInt(el.textContent, 10);
    if (old !== newVal) {
      el.textContent = newVal;
      el.classList.remove("bump");
      void el.offsetWidth; // reflow to restart animation
      el.classList.add("bump");
    }
  }

  function createTaskEl(task) {
    const li = document.createElement("li");
    li.className = "task-item" + (task.done ? " done" : "");
    li.dataset.id = task.id;
    li.innerHTML = `
      <label class="check-wrap">
        <input type="checkbox" ${task.done ? "checked" : ""}/>
        <span class="check-box">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </label>
      <span class="task-text">${escHtml(task.text)}</span>
      <button class="btn-del" title="Remove">&#10005;</button>
    `;

    // Toggle done
    li.querySelector("input").addEventListener("change", (e) => {
      const wasDone = task.done;
      task.done = e.target.checked;
      render();
      if (!wasDone && task.done) {
        showToast();
        launchConfetti();
      }
    });

    // Delete
    li.querySelector(".btn-del").addEventListener("click", () => {
      tasks = tasks.filter(t => t.id !== task.id);
      render();
    });

    return li;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── ADD TASK ───────────────────────────────────────────
  function addTask() {
    const text = inputEl.value.trim();
    if (!text) { inputEl.focus(); return; }
    tasks.push({ id: uid(), text, done: false });
    inputEl.value = "";
    render();
    inputEl.focus();
  }

  btnAdd.addEventListener("click", addTask);
  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });

  // ── TOAST ──────────────────────────────────────────────
  let toastTimer = null;
  function showToast() {
    clearTimeout(toastTimer);
    toast.classList.add("show");
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
  }

  // ── CONFETTI ───────────────────────────────────────────
  // Muted earthy confetti palette
  const COLORS = ["#7d8c6e","#b07d5a","#c4a882","#8e7d6e","#a3b08a","#d4b896","#6b7c5e"];
  let particles = [];
  let animId    = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function launchConfetti() {
    particles = [];
    const count = 90;
    for (let i = 0; i < count; i++) {
      particles.push({
        x:    Math.random() * canvas.width,
        y:    Math.random() * canvas.height * .4 - 30,
        r:    Math.random() * 7 + 3,
        d:    Math.random() * count,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        tilt: Math.random() * 10 - 10,
        tiltAngle: 0,
        tiltSpeed: Math.random() * .1 + .05,
        fallSpeed: Math.random() * 2.5 + 1.2,
        opacity: 1,
        shape: Math.random() > .5 ? "rect" : "circle",
      });
    }
    cancelAnimationFrame(animId);
    drawConfetti();
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.opacity <= 0) return;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle   = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate((p.tiltAngle * Math.PI) / 180);
      if (p.shape === "rect") {
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 1.6);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      p.y          += p.fallSpeed;
      p.tiltAngle  += p.tiltSpeed;
      p.tilt        = Math.sin(p.tiltAngle) * 12;

      // Fade when near bottom
      if (p.y > canvas.height * .75) {
        p.opacity -= .025;
      }
    });

    if (alive) {
      animId = requestAnimationFrame(drawConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ── INIT ───────────────────────────────────────────────
  render();
})();
</script>
</body>
</html>
